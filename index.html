<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BTS Report</title>

<!-- PWA -->
<meta name="application-name" content="BTS Report">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BTS Report">
<meta name="theme-color" content="#2563eb">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" id="pwa-manifest">
<link rel="apple-touch-icon" id="pwa-icon">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-mid:#dbeafe;
  --green:#16a34a;--green-bg:#f0fdf4;
  --red:#dc2626;--red-bg:#fef2f2;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;
  --g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;--g700:#374151;--g900:#111827;
  --font:'Plus Jakarta Sans',sans-serif;--r:12px
}
body{font-family:var(--font);background:var(--g50);color:var(--g900);padding-bottom:90px}

/* TOPBAR */
.topbar{background:#fff;border-bottom:1px solid var(--g200);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.logo{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.topbar-info{flex:1}
.topbar-title{font-size:15px;font-weight:800}
.topbar-sub{font-size:11px;color:var(--g400)}
.pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--g400);background:var(--g100);border-radius:20px;padding:4px 10px;transition:all .3s}
.pill.ok{color:var(--green);background:var(--green-bg)}
.pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.btn-nd{background:var(--g100);border:none;border-radius:8px;padding:6px 10px;font-family:var(--font);font-size:11px;font-weight:700;color:var(--g500);cursor:pointer}
.btn-nd:active{background:var(--g200)}

/* LAYOUT */
.wrap{max-width:520px;margin:0 auto;padding:12px}
.card{background:#fff;border-radius:var(--r);border:1px solid var(--g200);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-hd{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--g400);padding:10px 14px 0}

/* INFO GRID */
.ig-grid{display:grid;grid-template-columns:1fr 1fr}
.ig{padding:8px 14px;border-bottom:1px solid var(--g100);border-right:1px solid var(--g100)}
.ig.full{grid-column:span 2;border-right:none}
.ig:nth-child(even):not(.full){border-right:none}
.ig:last-child,.ig:nth-last-child(2):not(.full){border-bottom:none}
.ig-lbl{font-size:10px;font-weight:600;color:var(--g400);margin-bottom:2px}
.ig-inp{width:100%;font-family:var(--font);font-size:13px;font-weight:700;color:var(--g900);border:none;outline:none;background:transparent}
.ig-inp::placeholder{color:var(--g300);font-weight:400}

/* JAM BESAR */
.jam-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 14px;border-top:1px solid var(--g100)}
.jam-col{display:flex;flex-direction:column;align-items:center;gap:5px}
.jbtn{width:100%;display:flex;flex-direction:column;align-items:center;padding:10px 8px;border-radius:10px;border:1.5px dashed var(--g200);background:#fff;cursor:pointer;font-family:var(--font);gap:3px;transition:all .15s}
.jbtn.on{border-style:solid;border-color:var(--blue);background:var(--blue-bg)}
.jbtn:active{opacity:.75}
.jbtn-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--g400)}
.jbtn.on .jbtn-lbl{color:var(--blue)}
.jbtn-val{font-size:20px;font-weight:800;color:var(--g300)}
.jbtn.on .jbtn-val{color:var(--blue)}
@keyframes flash{0%{background:#dcfce7}100%{background:var(--blue-bg)}}
.jbtn.flash{animation:flash .5s ease}
.jedit{display:none;font-family:var(--font);font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-mid);border:none;border-radius:20px;padding:3px 12px;cursor:pointer}
.jedit:active{background:var(--blue);color:#fff}

/* STOP */
.stop{background:#fff;border-radius:var(--r);border:1px solid var(--g200);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stop-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--g100)}
.stop-num{min-width:24px;height:24px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.stop-name{flex:1;font-family:var(--font);font-size:14px;font-weight:700;color:var(--g900);border:none;outline:none;background:transparent}
.stop-name::placeholder{color:var(--g400);font-weight:500}
.stop-del{background:none;border:none;color:var(--g300);font-size:22px;cursor:pointer;line-height:1;border-radius:6px;padding:0 4px}
.stop-del:active{color:var(--red)}

/* PAKET */
.pkt-row{display:grid;grid-template-columns:2fr 1fr 1fr;border-bottom:1px solid var(--g100)}
.pkt{padding:7px 14px;border-right:1px solid var(--g100)}
.pkt:last-child{border-right:none}
.pkt-lbl{font-size:10px;font-weight:600;color:var(--g400);margin-bottom:1px}
.pkt-inp{width:100%;font-family:var(--font);font-size:16px;font-weight:800;color:var(--blue);border:none;outline:none;background:transparent}
.pkt-inp::placeholder{color:var(--g200);font-size:13px;font-weight:400}

/* META */
.meta-row{display:flex;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--g100)}
.meta-lbl{font-size:10px;font-weight:700;color:var(--g400);white-space:nowrap}
.meta-eta{font-family:var(--font);font-size:13px;font-weight:700;color:var(--g700);border:none;outline:none;background:transparent;width:72px}
.meta-sep{color:var(--g300)}
.meta-ket{flex:1;font-family:var(--font);font-size:12px;color:var(--g500);border:none;outline:none;background:transparent}
.meta-ket::placeholder{color:var(--g300)}
.dev{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.dev-late{background:var(--red-bg);color:var(--red)}
.dev-ok{background:var(--green-bg);color:var(--green)}
.dev-early{background:var(--blue-bg);color:var(--blue)}

/* 4 WAKTU */
.times{display:grid;grid-template-columns:repeat(4,1fr)}
.tfield{display:flex;flex-direction:column;align-items:center;gap:3px;padding-bottom:8px;border-right:1px solid var(--g100)}
.tfield:last-child{border-right:none}
.tbtn{width:100%;display:flex;flex-direction:column;align-items:center;padding:9px 4px 4px;border:none;background:transparent;cursor:pointer;font-family:var(--font);gap:2px;transition:background .1s}
.tbtn:active{background:var(--blue-mid)}
.tbtn.on{background:var(--blue-bg)}
.tbtn.on:active{background:var(--blue-mid)}
.tbtn.flash{animation:flash .5s ease}
.tbtn-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--g400)}
.tbtn.on .tbtn-lbl{color:var(--blue)}
.tbtn-val{font-size:15px;font-weight:800;color:var(--g300)}
.tbtn.on .tbtn-val{color:var(--blue)}
.tedit{display:none;font-family:var(--font);font-size:10px;font-weight:700;color:var(--blue);background:var(--blue-mid);border:none;border-radius:20px;padding:2px 8px;cursor:pointer}
.tedit:active{background:var(--blue);color:#fff}

/* REKAP */
.rekap{display:grid;grid-template-columns:repeat(3,1fr)}
.rk{padding:12px;text-align:center;border-right:1px solid var(--g100)}
.rk:last-child{border-right:none}
.rk-num{font-size:24px;font-weight:800;color:var(--blue)}
.rk-lbl{font-size:10px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.noted-wrap{padding:10px 14px;border-top:1px solid var(--g100)}
.noted-inp{width:100%;font-family:var(--font);font-size:13px;color:var(--g700);border:none;outline:none;background:transparent;resize:none}
.noted-inp::placeholder{color:var(--g300)}

/* ADD STOP */
.btn-add{width:100%;padding:12px;background:#fff;border:1.5px dashed var(--g200);border-radius:var(--r);font-family:var(--font);font-size:14px;font-weight:700;color:var(--g400);cursor:pointer;margin-bottom:10px}
.btn-add:active{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}

/* BOTTOM BAR */
.bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--g200);padding:10px 14px;display:flex;gap:8px;z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.btn-copy{flex:1;padding:13px;background:var(--g100);border:none;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;color:var(--g700);cursor:pointer}
.btn-copy:active{background:var(--g200)}
.btn-wa{flex:2;padding:13px;background:var(--blue);border:none;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(37,99,235,.25)}
.btn-wa:active{background:#1d4ed8}

/* TOAST */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--g900);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:24px 20px 16px;width:min(290px,90vw);display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.modal-lbl{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--g400)}
.modal-inp{font-family:var(--font);font-size:42px;font-weight:800;color:var(--blue);border:none;outline:none;text-align:center;background:transparent;width:100%;border-bottom:2px solid var(--blue-mid);padding-bottom:4px}
.modal-btns{display:flex;gap:8px;width:100%;margin-top:4px}
.modal-cancel{flex:1;padding:12px;background:var(--g100);border:none;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;color:var(--g500);cursor:pointer}
.modal-cancel:active{background:var(--g200)}
.modal-ok{flex:2;padding:12px;background:var(--blue);border:none;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;color:#fff;cursor:pointer}
.modal-ok:active{background:#1d4ed8}
.modal-reset{background:none;border:none;color:var(--g400);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;padding:4px 8px;border-radius:6px}
.modal-reset:active{color:var(--red);background:var(--red-bg)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🚚</div>
  <div class="topbar-info">
    <div class="topbar-title">BTS Report</div>
    <div class="topbar-sub">Daily Delivery Log</div>
  </div>
  <div class="pill" id="pill"><div class="pill-dot"></div><span id="pill-txt">Draft</span></div>
  <button class="btn-nd" onclick="newDay()">🔄 Hari Baru</button>
</div>

<div class="wrap">
  <div class="card" style="margin-top:2px">
    <div class="card-hd">Info</div>
    <div class="ig-grid">
      <div class="ig"><div class="ig-lbl">Satmob</div><input class="ig-inp" id="f-satmob" placeholder="Nama sopir" autocomplete="off"></div>
      <div class="ig"><div class="ig-lbl">Asmob</div><input class="ig-inp" id="f-asmob" placeholder="Nama asisten" autocomplete="off"></div>
      <div class="ig"><div class="ig-lbl">Plat Mobil</div><input class="ig-inp" id="f-plat" placeholder="B-XXXX XXX" autocomplete="off"></div>
      <div class="ig"><div class="ig-lbl">Tanggal</div><input class="ig-inp" id="f-tgl" type="date"></div>
      <div class="ig full"><div class="ig-lbl">Rute</div><input class="ig-inp" id="f-rute" placeholder="STR-BTS42-STR" autocomplete="off"></div>
    </div>
    <div class="jam-row">
      <div class="jam-col">
        <button class="jbtn" id="jbtn-brkt" onclick="stampJam('brkt')">
          <div class="jbtn-lbl">🟢 Berangkat</div>
          <div class="jbtn-val" id="jval-brkt">--:--</div>
        </button>
        <button class="jedit" id="jedit-brkt" onclick="openModal('jam','brkt')">✏️ ubah jam</button>
      </div>
      <div class="jam-col">
        <button class="jbtn" id="jbtn-hub" onclick="stampJam('hub')">
          <div class="jbtn-lbl">🔴 Tiba HUB</div>
          <div class="jbtn-val" id="jval-hub">--:--</div>
        </button>
        <button class="jedit" id="jedit-hub" onclick="openModal('jam','hub')">✏️ ubah jam</button>
      </div>
    </div>
  </div>

  <div id="stops"></div>
  <button class="btn-add" onclick="addStop()">+ Tambah Titik Kirim</button>

  <div class="card">
    <div class="card-hd" style="padding-bottom:6px">Rekap</div>
    <div class="rekap">
      <div class="rk"><div class="rk-num" id="r-paket">0</div><div class="rk-lbl">Paket</div></div>
      <div class="rk"><div class="rk-num" id="r-mb">0</div><div class="rk-lbl">MB</div></div>
      <div class="rk"><div class="rk-num" id="r-bp">0</div><div class="rk-lbl">BP</div></div>
    </div>
    <div class="noted-wrap">
      <textarea class="noted-inp" id="f-noted" placeholder="Catatan / noted..." rows="2"></textarea>
    </div>
  </div>
</div>

<div class="bar">
  <button class="btn-wa" onclick="salin(true)" style="flex:1">✅ Kirim ke WhatsApp</button>
</div>

<!-- MODAL COPY -->

<!-- MODAL EDIT JAM -->
<div class="modal-ov" id="modal-ov" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-lbl" id="modal-lbl">Edit Jam</div>
    <input class="modal-inp" id="modal-inp" type="time">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Batal</button>
      <button class="modal-ok" onclick="saveModal()">✓ Simpan</button>
    </div>
    <button class="modal-reset" onclick="resetModal()">🗑 Hapus jam ini</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PKEY='bts_p2', DKEY='bts_d2';
let stopIdx=0, modalCtx=null;

function $(id){ return document.getElementById(id); }
function nowt(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

function toast(msg){
  const el=$('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2200);
}
function pillOk(){
  const p=$('pill'),t=$('pill-txt'); p.classList.add('ok'); t.textContent='Tersimpan';
  clearTimeout(p._t); p._t=setTimeout(()=>{ p.classList.remove('ok'); t.textContent='Draft'; },1800);
}
function stopIds(){ return [...document.querySelectorAll('.stop')].map(el=>+el.id.split('-')[1]); }
function rekal(){
  let p=0,m=0,b=0;
  const ids=stopIds();
  ids.slice(1).forEach(i=>{ // skip stop pertama (CGKG/HUB)
    p+=+($(`sp-${i}`)?.value||0);
    m+=+($(`sm-${i}`)?.value||0);
    b+=+($(`sb-${i}`)?.value||0);
  });
  $('r-paket').textContent=p.toLocaleString('id');
  $('r-mb').textContent=m; $('r-bp').textContent=b;
}

// ── ADD STOP ──
function addStop(d={}){
  stopIdx++; const i=stopIdx;
  const isFirst = (i===1);
  const el=document.createElement('div');
  el.className='stop'; el.id=`stop-${i}`;
  el.innerHTML=`
    <div class="stop-hd">
      ${isFirst ? '' : `<div class="stop-num">${i-1}</div>`}
      <input class="stop-name" id="sn-${i}" placeholder="Nama titik kirim..." value="${esc(d.nama)}">
      <button class="stop-del" onclick="delStop(${i})">×</button>
    </div>
    <div class="pkt-row">
      <div class="pkt"><div class="pkt-lbl">Paket</div><input class="pkt-inp" id="sp-${i}" type="number" inputmode="numeric" placeholder="0" value="${d.paket||''}"></div>
      <div class="pkt"><div class="pkt-lbl">MB</div><input class="pkt-inp" id="sm-${i}" type="number" inputmode="numeric" placeholder="0" value="${d.mb||''}"></div>
      <div class="pkt"><div class="pkt-lbl">BP</div><input class="pkt-inp" id="sb-${i}" type="number" inputmode="numeric" placeholder="0" value="${d.bp||''}"></div>
    </div>
    <div class="meta-row" ${isFirst?'style="display:none"':''}>
      <span class="meta-lbl">ETA</span>
      <input class="meta-eta" id="se-${i}" type="time" value="${d.eta||''}">
      <span class="meta-sep">|</span>
      <input class="meta-ket" id="sk-${i}" placeholder="keterangan..." value="${esc(d.ket)}">
      <div id="dev-${i}" style="display:none"></div>
    </div>
    <div class="times">
      ${(isFirst ? ['Tiba','Brkt'] : ['Tiba','Proses','Selesai','Brkt']).map(k=>`
      <div class="tfield">
        <button class="tbtn" id="tbtn-${k}-${i}" onclick="stampTime('${k}',${i})">
          <div class="tbtn-lbl">${k}</div>
          <div class="tbtn-val" id="tval-${k}-${i}">--:--</div>
        </button>
        <button class="tedit" id="tedit-${k}-${i}" onclick="openModal('stop','${k}',${i})">✏️ ubah</button>
      </div>`).join('')}
    </div>`;
  $('stops').appendChild(el);
  $(`se-${i}`).addEventListener('input',()=>{ calcDev(i); autoSave(); });
  $(`sk-${i}`).addEventListener('input', autoSave);
  const keys = isFirst ? ['Tiba','Brkt'] : ['Tiba','Proses','Selesai','Brkt'];
  keys.forEach(k=>{ const v=d[k.toLowerCase()]; if(v&&v!=='-') _setTime(k,i,v); });
  calcDev(i); rekal();
}

function delStop(i){
  $(`stop-${i}`)?.remove(); rekal(); autoSave();
}

// ── STAMP ──
function stampTime(k,i){
  if($(`tbtn-${k}-${i}`)?.dataset?.t) return; // sudah ada, tap diabaikan
  _setTime(k,i,nowt());
  $(`tbtn-${k}-${i}`).classList.add('flash');
  setTimeout(()=>$(`tbtn-${k}-${i}`)?.classList.remove('flash'),500);
  calcDev(i); autoSave();
}
function stampJam(key){
  if($(`jbtn-${key}`)?.dataset?.t) return;
  _applyJam(key,nowt());
  $(`jbtn-${key}`).classList.add('flash');
  setTimeout(()=>$(`jbtn-${key}`)?.classList.remove('flash'),500);
  autoSave();
}

// ── SET / CLEAR ──
function _setTime(k,i,t){
  const btn=$(`tbtn-${k}-${i}`), val=$(`tval-${k}-${i}`), edit=$(`tedit-${k}-${i}`);
  if(!btn||!val) return;
  btn.dataset.t=t; val.textContent=t; btn.classList.add('on');
  if(edit) edit.style.display='inline-block';
}
function _clearTime(k,i){
  const btn=$(`tbtn-${k}-${i}`), val=$(`tval-${k}-${i}`), edit=$(`tedit-${k}-${i}`);
  if(btn){ btn.dataset.t=''; btn.classList.remove('on','flash'); }
  if(val) val.textContent='--:--';
  if(edit) edit.style.display='none';
}
function _applyJam(key,t){
  const btn=$(`jbtn-${key}`), val=$(`jval-${key}`), edit=$(`jedit-${key}`);
  if(!btn||!val) return;
  btn.dataset.t=t; val.textContent=t; btn.classList.add('on');
  if(edit) edit.style.display='inline-block';
}
function _clearJam(key){
  const btn=$(`jbtn-${key}`), val=$(`jval-${key}`), edit=$(`jedit-${key}`);
  if(btn){ btn.dataset.t=''; btn.classList.remove('on','flash'); }
  if(val) val.textContent='--:--';
  if(edit) edit.style.display='none';
}

// ── DEV CHIP ──
function calcDev(i){
  const eta=$(`se-${i}`)?.value, t=$(`tbtn-Tiba-${i}`)?.dataset?.t, chip=$(`dev-${i}`);
  if(!chip) return;
  if(!eta||!t){ chip.style.display='none'; return; }
  const [eh,em]=eta.split(':').map(Number), [th,tm]=t.split(':').map(Number);
  const diff=(th*60+tm)-(eh*60+em);
  chip.style.display='block';
  if(diff===0){ chip.className='dev dev-ok'; chip.textContent='Tepat'; }
  else if(diff>0){ chip.className='dev dev-late'; chip.textContent=`+${diff}m`; }
  else{ chip.className='dev dev-early'; chip.textContent=`${diff}m`; }
}

// ── MODAL ──
function openModal(type,...args){
